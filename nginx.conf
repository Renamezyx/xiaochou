user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 4096;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    include /etc/nginx/conf.d/*.conf;

    # =========================
    # HTTP -> HTTPS
    # =========================

    server {
        listen 80;
        listen [::]:80;

        server_name therzyx.com www.therzyx.com;

        return 301 https://$host$request_uri;
    }

    # =========================
    # HTTPS 主站
    # =========================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;

        server_name therzyx.com www.therzyx.com;

        ssl_certificate     /etc/nginx/ssl/therzyx.com_bundle.crt;
        ssl_certificate_key /etc/nginx/ssl/therzyx.com.key;

        ssl_protocols TLSv1.2 TLSv1.3;

        # 防止请求落空（很重要）
        root /usr/share/nginx/html;
        index index.html;

        # =========================
        # /skjh 路由
        # =========================
        location = /skjh {
            return 301 /skjh/;
        }

        location /skjh/ {
            alias /var/www/test/;
            index index.html;

            # SPA刷新不404（保留）
            try_files $uri $uri/ /skjh/index.html;
        }
        location = /xiaochou {
            return 301 /xiaochou/;
        }

        # 禁止外网直接读埋点日志
        location ^~ /xiaochou/logs/ {
            deny all;
            return 404;
        }

        # 埋点 API（php-fpm 监听 127.0.0.1:9000）
        location ~ ^/xiaochou/api/(?<phpfile>.+\.php)$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME /var/www/xiaochou/api/$phpfile;
            fastcgi_pass 127.0.0.1:9000;
        }

        location /xiaochou/ {
            alias /var/www/xiaochou/;
            index index.html;
        }

        # =========================
        # 默认入口（防止空白）
        # =========================
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }
}