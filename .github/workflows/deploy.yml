name: Deploy Static Site

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1️⃣ 安装 rsync
      - name: Install rsync
        run: sudo apt-get update && sudo apt-get install -y rsync

      # 2️⃣ 写入 SSH key
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      # 3️⃣ 🚀 删除旧文件 + 同步新文件（核心）
      - name: Deploy (clean + sync)
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/xiaochou/

      # 埋点日志目录（CentOS php-fpm 默认用户 apache）
      - name: Prepare logs directory
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /var/www/xiaochou/logs && chown -R apache:apache /var/www/xiaochou/logs && chmod 775 /var/www/xiaochou/logs"

      # 4️⃣ 可选：重启 nginx
      - name: Reload nginx
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "nginx -s reload || systemctl reload nginx"